<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing List - Vacances</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 5px; font-size: 1.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .subtitle { text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 30px; font-size: 0.9rem; }
        .section, .category-tools {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .section-title-main {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .delete-category-btn {
            background: #fbeaea;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 7px 10px;
            border-radius: 8px;
        }
        .delete-category-btn:hover { background: #f5d0d0; }
        .item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ecf0f1;
            transition: background-color 0.2s;
        }
        .item:last-child { border-bottom: none; }
        .item:hover { background-color: #f8f9fa; }
        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            margin-right: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .checkbox:hover { border-color: #3498db; }
        .checkbox.checked {
            background-color: #2ecc71;
            border-color: #2ecc71;
        }
        .checkbox.checked::after {
            content: '\2713';
            color: white;
            font-size: 16px;
            font-weight: bold;
        }
        .item-text { flex: 1; font-size: 1rem; }
        .item-text.checked {
            text-decoration: line-through;
            color: #95a5a6;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 5px 10px;
            opacity: 0;
            transition: opacity 0.2s;
            line-height: 1;
        }
        .item:hover .delete-btn { opacity: 1; }
        .add-item, .add-category {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #ecf0f1;
        }
        .add-category {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }
        .add-input {
            flex: 1;
            min-width: 0;
            padding: 10px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        .add-input:focus { border-color: #3498db; }
        .add-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        .add-btn:hover { background-color: #2980b9; }
        .category-help {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-top: 10px;
            line-height: 1.4;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #ecf0f1;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #2ecc71;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 8px;
        }
        .share-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .share-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .share-url {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: monospace;
            word-break: break-all;
            background: #f8f9fa;
            margin-bottom: 10px;
        }
        .copy-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
        }
        .copy-btn:hover { background-color: #27ae60; }
        .copy-btn:active { transform: scale(0.98); }
        .sync-info {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        @media (max-width: 420px) {
            .add-category { flex-direction: column; }
            .add-btn { width: 100%; }
            .section-title { align-items: flex-start; }
        }
    
        .save-btn {
            background: #48bb78; color: white; border: none;
            padding: 10px 20px; border-radius: 30px; cursor: pointer;
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            margin: 10px auto; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(72,187,120,0.3);
        }
        .save-btn:hover { background: #38a169; transform: translateY(-2px); }
        .save-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .sync-badge {
            text-align: center; font-size: 0.75rem; padding: 4px 12px;
            border-radius: 20px; display: inline-block; margin-bottom: 10px;
        }
        .sync-badge.local { background: #ffeaa7; color: #b8860b; }
        .sync-badge.cloud { background: #d4edda; color: #155724; }
        .item-actions { opacity: 1 !important; }

    </style>
</head>
<body>
    <div class="container">
        <h1>🪟 Avant de partir</h1>
        <p class="subtitle">Packing list - Vacances</p>
        <div style="text-align:center;">
            <div id="sync-badge" class="sync-badge local">💾 Local</div>
        </div>
        <button class="save-btn" onclick="saveList()" id="save-btn">💾 Sauvegarder dans le cloud</button>
        

        <div class="category-tools">
            <div class="share-title">➕ Créer une catégorie</div>
            <div class="add-category">
                <input type="text" class="add-input" id="category-input" placeholder="Ex : César, Miu, Papa, Plage...">
                <button class="add-btn" onclick="createCategory()">Créer</button>
            </div>
            <p class="category-help">Chaque catégorie a sa propre liste, sa progression et elle est incluse dans le lien partagé.</p>
        </div>

        <div id="categories-container"></div>

        <div class="share-section">
            <div class="share-title">🔗 Partager cette liste</div>
            <input type="text" class="share-url" id="share-url" readonly>
            <button class="copy-btn" onclick="copyLink()">📋 Copier le lien partagé</button>
            <p class="sync-info">Toutes les données sont dans le lien. Partage = synchro immédiate.</p>
        </div>
    </div>

    <script>
        const initialCategories = [
            { id: 'cesar', name: 'César', icon: '👶', color: '#e74c3c' },
            { id: 'miu', name: 'Miu', icon: '🐱', color: '#9b59b6' }
        ];

        const initialData = {
            cesar: [
                "Repas", "Tenue piscine", "Chapeau été", "Couches", "Matelas à langer",
                "Lunette de soleil", "Tenue été + tenue manche longue", "Casquette snoopy",
                "1 gilet", "Turbulette", "Serviette", "Produit à langer + bain + Gant grenouille",
                "Jouet + livre", "Tapis éveil", "Siège nomade",
                "Trousse pharma (Doliprane et gel dent, sirop toux)", "Bavoir + 2 cuillères",
                "Crème solaire", "Doudou", "Babyphone", "Drap matelas lit", "Boîte à musique",
                "Petit ventilateur", "Lit parapluie (pour royan)", "Veilleuse"
            ],
            miu: ["Pled miu", "Croquette", "Litière", "Spray pheromone"]
        };

        const categoryColors = ['#e74c3c', '#9b59b6', '#3498db', '#f39c12', '#16a085', '#d35400', '#2c3e50', '#27ae60'];
        const categoryIcons = ['🧳', '👕', '🧸', '🏖️', '🚗', '🏠', '⭐', '📦'];

        let lists = {};
        let listId = null;
        let isSaving = false;
        let categories = [];

        function encodeData() {
            const compactLists = {};
            Object.keys(lists).forEach(cat => {
                compactLists[cat] = lists[cat].map(item => [item.text, item.checked ? 1 : 0]);
            });

            const compactCategories = categories.map(category => [
                category.id,
                category.name,
                category.icon,
                category.color
            ]);

            const json = JSON.stringify({
                v: 2,
                c: compactCategories,
                l: compactLists
            });
            const b64 = btoa(unescape(encodeURIComponent(json)));
            return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        function decodeData(str) {
            try {
                str = str.replace(/-/g, '+').replace(/_/g, '/');
                while (str.length % 4 !== 0) str += '=';
                const json = decodeURIComponent(escape(atob(str)));
                const data = JSON.parse(json);

                if (data.v === 2 && Array.isArray(data.c) && data.l) {
                    const decodedLists = {};
                    Object.keys(data.l).forEach(cat => {
                        decodedLists[cat] = data.l[cat].map(item => ({
                            text: item[0],
                            checked: !!item[1]
                        }));
                    });

                    const decodedCategories = data.c.map(category => ({
                        id: category[0],
                        name: category[1],
                        icon: category[2] || '🧳',
                        color: category[3] || '#3498db'
                    })).filter(category => decodedLists[category.id]);

                    return {
                        categories: decodedCategories,
                        lists: decodedLists
                    };
                }

                // Compatibilité avec les anciens liens partagés.
                const decodedLists = {};
                Object.keys(data).forEach(cat => {
                    decodedLists[cat] = data[cat].map(item => ({
                        text: item[0],
                        checked: !!item[1]
                    }));
                });

                return {
                    categories: Object.keys(decodedLists).map((id, index) => ({
                        id,
                        name: getDefaultCategoryName(id),
                        icon: id === 'cesar' ? '👶' : id === 'miu' ? '🐱' : '🧳',
                        color: categoryColors[index % categoryColors.length]
                    })),
                    lists: decodedLists
                };
            } catch (e) {
                return null;
            }
        }

        function getShareUrl() {
            const url = new URL(window.location.href);
            if (listId) {
                url.searchParams.set('list', listId);
                url.searchParams.delete('d');
            } else {
                const encoded = encodeData();
                url.searchParams.set('d', encoded);
            }
            return url.toString();
        }

        function updateUrl() {
            const url = getShareUrl();
            window.history.replaceState({}, '', url);
            document.getElementById('share-url').value = url;
        }

        async function loadLists() {
            const params = new URLSearchParams(window.location.search);
            listId = params.get('list') || null;
            
            if (listId && listId.length >= 4) {
                try {
                    const resp = await fetch('/api/lists/' + listId);
                    if (resp.ok) {
                        const data = await resp.json();
                        categories = data.categories;
                        lists = data.lists;
                        updateSyncBadge('cloud');
                        renderAll();
                        updateProgress();
                        updateUrl();
                        startAutoSave();
                        return;
                    }
                } catch(e) { console.log('KV load failed', e); }
            }
            
            const encoded = params.get('d');
            if (encoded) {
                const decoded = decodeData(encoded);
                if (decoded) {
                    categories = decoded.categories;
                    lists = decoded.lists;
                    renderAll();
                    updateProgress();
                    updateUrl();
                    return;
                }
            }

            categories = initialCategories.map(category => ({ ...category }));
            lists = {};
            Object.keys(initialData).forEach(categoryId => {
                lists[categoryId] = initialData[categoryId].map(text => ({ text, checked: false }));
            });

            renderAll();
            updateProgress();
            updateUrl();
        }

        function renderAll() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            categories.forEach(category => {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `
                    <div class="section-title" style="color: ${category.color}">
                        <div class="section-title-main">
                            <span>${escapeHtml(category.icon)}</span>
                            <span>${escapeHtml(category.name).toUpperCase()}</span>
                        </div>
                        <button class="delete-category-btn" onclick="deleteCategory('${category.id}')">Supprimer</button>
                    </div>
                    <div id="${category.id}-list"></div>
                    <div class="add-item">
                        <input type="text" class="add-input" id="${category.id}-input" placeholder="Ajouter un item...">
                        <button class="add-btn" onclick="addItem('${category.id}')">+</button>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="${category.id}-progress" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="${category.id}-progress-text">0 / 0</div>
                `;
                container.appendChild(section);

                document.getElementById(`${category.id}-input`).addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') addItem(category.id);
                });

                renderList(category.id);
            });
        }

        function renderList(category) {
            const container = document.getElementById(`${category}-list`);
            if (!container) return;

            container.innerHTML = '';
            if (!lists[category] || lists[category].length === 0) {
                container.innerHTML = '<div style="color:#95a5a6;text-align:center;padding:10px;">Aucun item</div>';
                return;
            }

            lists[category].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="checkbox ${item.checked ? 'checked' : ''}" onclick="toggleItem('${category}', ${index})"></div>
                    <span class="item-text ${item.checked ? 'checked' : ''}">${escapeHtml(item.text)}</span>
                    <button class="delete-btn" onclick="deleteItem('${category}', ${index})">×</button>
                `;
                container.appendChild(div);
            });
        }

        function toggleItem(category, index) {
            lists[category][index].checked = !lists[category][index].checked;
            renderList(category);
            updateProgress();
            updateUrl();
        }

        function deleteItem(category, index) {
            lists[category].splice(index, 1);
            renderList(category);
            updateProgress();
            updateUrl();
        }

        function addItem(category) {
            const input = document.getElementById(`${category}-input`);
            const text = input.value.trim();
            if (text) {
                lists[category].push({ text, checked: false });
                input.value = '';
                renderList(category);
                updateProgress();
                updateUrl();
            }
        }

        function createCategory() {
            const input = document.getElementById('category-input');
            const name = input.value.trim();

            if (!name) return;

            const id = createUniqueCategoryId(name);
            const index = categories.length;
            const category = {
                id,
                name,
                icon: categoryIcons[index % categoryIcons.length],
                color: categoryColors[index % categoryColors.length]
            };

            categories.push(category);
            lists[id] = [];
            input.value = '';

            renderAll();
            updateProgress();
            updateUrl();

            setTimeout(() => {
                const newInput = document.getElementById(`${id}-input`);
                if (newInput) newInput.focus();
            }, 0);
        }

        function deleteCategory(categoryId) {
            const category = categories.find(item => item.id === categoryId);
            if (!category) return;

            const hasItems = lists[categoryId] && lists[categoryId].length > 0;
            const message = hasItems
                ? `Supprimer la catégorie "${category.name}" et tous ses items ?`
                : `Supprimer la catégorie "${category.name}" ?`;

            if (!confirm(message)) return;

            categories = categories.filter(item => item.id !== categoryId);
            delete lists[categoryId];

            renderAll();
            updateProgress();
            updateUrl();
        }

        function updateProgress() {
            categories.forEach(category => {
                const total = lists[category.id] ? lists[category.id].length : 0;
                const checked = lists[category.id] ? lists[category.id].filter(item => item.checked).length : 0;
                const percentage = total > 0 ? (checked / total) * 100 : 0;
                const progress = document.getElementById(`${category.id}-progress`);
                const text = document.getElementById(`${category.id}-progress-text`);

                if (progress) progress.style.width = `${percentage}%`;
                if (text) text.textContent = `${checked} / ${total}`;
            });
        }

        function createUniqueCategoryId(name) {
            const base = slugify(name) || `categorie-${Date.now()}`;
            let id = base;
            let suffix = 2;

            while (lists[id]) {
                id = `${base}-${suffix}`;
                suffix += 1;
            }

            return id;
        }

        function slugify(text) {
            return text
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function getDefaultCategoryName(id) {
            if (id === 'cesar') return 'César';
            if (id === 'miu') return 'Miu';
            return id.replace(/-/g, ' ');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyLink() {
            const url = document.getElementById('share-url').value;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.querySelector('.copy-btn');
                const original = btn.textContent;
                btn.textContent = '✅ Copié !';
                btn.style.backgroundColor = '#27ae60';
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.backgroundColor = '';
                }, 2000);
            }).catch(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '❌ Erreur de copie';
                setTimeout(() => btn.textContent = '📋 Copier le lien partagé', 2000);
            });
        }


        async function saveList() {
            const id = listId || generateListId();
            try {
                const resp = await fetch('/api/lists/' + id, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categories, lists })
                });
                if (!resp.ok) throw new Error('Save failed');
                listId = id;
                window.history.replaceState({}, '', '/?list=' + id);
                updateSyncBadge('cloud');
                startAutoSave();
                const btn = document.getElementById('save-btn');
                btn.textContent = '✅ Sauvegardé !';
                btn.disabled = true;
                setTimeout(function() { btn.textContent = '☁️ Synchronisé'; }, 2000);
            } catch(e) { alert('Erreur sauvegarde cloud: ' + e.message); }
        }

        function generateListId() {
            var arr = new Uint8Array(6);
            crypto.getRandomValues(arr);
            return Array.from(arr, function(b) { return b.toString(36); }).join('');
        }

        function updateSyncBadge(mode) {
            var badge = document.getElementById('sync-badge');
            if (mode === 'cloud') {
                badge.textContent = '☁️ Synchronisé'; badge.className = 'sync-badge cloud';
            } else {
                badge.textContent = '💾 Local'; badge.className = 'sync-badge local';
            }
        }

        function startAutoSave() {
            if (isSaving) return;
            isSaving = true;
            setInterval(function() {
                if (listId) saveList();
            }, 4000);
        }
        document.addEventListener('DOMContentLoaded', function() {
            loadLists();

            document.getElementById('category-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') createCategory();
            });
        });
    </script>
</body>
</html>
